{% extends "layouts/base.html" %}

{% block title %}{{ game.name }} | {{ app_name }}{% endblock %}

{% block content %}
    <div class="py-5">
        <h1>{{ game.name }}</h1>
        {% if game.image_url %}
        <img src="{{ game.image_url }}" class="img-fluid rounded mb-3" alt="{{ game.name }}">
        {% endif %}
        {% if game.category %}
        <p class="text-muted">
            <i class="fa-solid fa-puzzle-piece"></i>
            {{ game.category }}
        </p>
        {% endif %}
    </div>
{% endblock %}
