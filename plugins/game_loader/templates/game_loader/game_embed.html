<!DOCTYPE html>
<html>

<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="/static/game_loader/css/game_embed.css">
    <title>{{ game.name }} | {{ app_name }}</title>
    <meta name="robots" content="noindex">
</head>

<body>

    <div class="game-container">
        <iframe class="game-iframe"
            src="{% if request.query_params.get('proxy') == 'true' %}/proxy/frame/?url={% endif %}{{ game.iframe }}"></iframe>
    </div>

    <div class="bottom-bar">
        <div class="logo">
            <a href="/" target="_blank"><img src="/static/images/navbar_logo.png"></a>
        </div>
        <div class="icons">
            <i class="fas fa-rotate-right" id="reloadIcon"></i>
            <i class="fas fa-expand" id="expandButton"></i>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="/static/game_loader/js/game_embed.js"></script>

</body>

</html>
