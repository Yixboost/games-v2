<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="/assets/images/logo.png">
    <title>Yixboost Games</title>
</head>

<body>

    {% include "partials/navbar.html" %}

    <div class="container py-4">
        <h1 class="mb-4">Welcome to Yixboost Games!</h1>
    </div>
    <div class="container py-4">
        <h2>All games</h2>
        <hr>
        <div class="row row-cols-1 row-cols-md-5 g-4">
            {% for game in games %}
            <div class="col">
                <a href="/g/{{ game.id }}" class="card text-decoration-none">
                    <img src="{{ game.image_url }}" class="card-img-top" alt="{{ game.name }}">

                    <div class="card-body">
                        <div class="card-buttons d-flex gap-2">
                            <div class="card-content flex-grow-1">
                                <h4 class="card-title">{{ game.name }}</h4>

                                <p class="card-text fw-light">
                                    <i class="fa-solid fa-puzzle-piece"></i>
                                    {{ game.category }}
                                </p>
                            </div>
                        </div>
                    </div>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>

    {% include "partials/footer.html" %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/assets/js/theme_toggle.js"></script>

</body>

</html>
