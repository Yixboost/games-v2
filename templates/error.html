{% extends "layouts/base.html" %}
{% block title %}Whoops | {{ app_name }}{% endblock %}

{% block content %}
<div class="main-section upper-section">
    <div class="row">
        <div class="col-lg-12">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center">
                    <img src="/static/images/error.png" height="200" alt="404 Error">
                    <br><br>
                    <div class="heading-section">
                        <h4>Error <em>{{ error.code }}</em></h4>
                    </div>
                    <p>{{ error.description }}</p>
                    <br>
                    <div class="main-button">
                        <a onclick="history.back()">Go back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
