{% extends "layouts/base.html" %}

{% block title %}404 | {{ app_name }}{% endblock %}

{% block content %}

<div class="main-section upper-section">
    <div class="row">
        <div class="col-lg-12">
            <div class="row justify-content-center">
                <div class="col-lg-8 text-center">
                    <img src="/static/images/error.png" height="200" alt="404 Error">
                    <br><br>
                    <div class="heading-section">
                        <h4>404 <em>Not Found</em></h4>
                    </div>
                    <p>No page found at <strong>{{ request.path }}</strong></p>
                    <br>
                    <div class="main-button">
                        <a onclick="history.back()">Go back</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
